services:
  fastendpoints-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
      #- "80:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      #- ASPNETCORE_URLS=http://0.0.0.0:8080
    restart: unless-stopped
